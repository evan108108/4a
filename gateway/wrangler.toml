# 4A gateway — Cloudflare Worker config
#
# Single Worker handling all 4A routes:
#   - apex (4a4.ai/*) serves the JSON-LD context document and the public landing
#   - api.4a4.ai/* will host the read API (Day 3+)
#   - mcp.4a4.ai/* will host the MCP/SSE adapter (Day 3+)
#
# Account ID and credentials come from /Users/evan/projects/4a/.env via bin/wrangler.
# Do NOT hardcode account_id here; bin/wrangler injects CLOUDFLARE_ACCOUNT_ID.

name = "4a-gateway"
main = "src/router.ts"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Static-rendered site (built from repo markdown by `npm run build:site`).
# Worker runs first; for any path not handled by the worker, it delegates
# to env.ASSETS.fetch(...) which serves the rendered HTML.
[assets]
directory = "./dist/site"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = true

# Bind the worker to the three zones.
# Each route uses zone_name (not zone_id) so wrangler resolves the zone via the
# account context.
[[routes]]
pattern = "4a4.ai/*"
zone_name = "4a4.ai"

[[routes]]
pattern = "mcp.4a4.ai/*"
zone_name = "4a4.ai"

[[routes]]
pattern = "api.4a4.ai/*"
zone_name = "4a4.ai"

# Durable Object: holds outbound WS subscriptions to Nostr relays and stores
# verified 4A events keyed by addressable triple kind:pubkey:d.
# Read endpoints (Task 2) will look up RELAY_POOL via env binding.
[[durable_objects.bindings]]
name = "RELAY_POOL"
class_name = "RelayPool"

# MCP/SSE session hub. Singleton (id "main") so the GET /sse and POST /messages
# requests for a given session always reach the same in-memory map even when
# CF routes them to different worker isolates.
[[durable_objects.bindings]]
name = "MCP_HUB"
class_name = "McpHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayPool"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["McpHub"]

# Belt-and-suspender: every 5 minutes, the worker's scheduled() handler
# calls RelayPool.sweepFromRelays() to backfill any events the live
# subscriptions missed. Real-time path is the persistent WS; this is the
# safety net.
[triggers]
crons = ["*/5 * * * *"]
